services:
  rspamd-drp:
    image: eilandert/rspamd-dcc-razor-pyzor:latest
    container_name: rspamd-drp
    restart: unless-stopped

    # No `ports:` — gozer is NOT published to the host. It is reachable only
    # on the internal docker network, by service name, from your rspamd (and
    # dovecot) containers: http://rspamd-drp:8077
    networks:
      - drp

    environment:
      TZ: Europe/Amsterdam

      # Verbose logging: per-request access line + verdict/timing/cache detail.
      GOZER_VERBOSE: "0"                # 1 to enable

      # --- Cache ------------------------------------------------------------
      # /check verdicts cached by body hash (DCC/Razor/Pyzor target bulk = repeats).
      GOZER_CACHE_TTL: "300"            # seconds; 0 disables
      # GOZER_CACHE_SIZE: "4096"        # in-memory LRU entries
      # Shared cache across distributed scanners (else in-process LRU):
      # GOZER_REDIS_URL: "redis://valkey:6379/5"
      # GOZER_REDIS_PREFIX: "drp:check:"

      # --- Auth (required) --------------------------------------------------
      # gozer refuses every POST (503) until a token is set. The rspamd
      # plugin and dovecot drp-report must present the same value. Prefer the
      # _FILE form (Docker secret) over an inline value.
      GOZER_TOKEN_FILE: /run/secrets/drp_token
      # or, inline (less safe): GOZER_TOKEN: "change-me"

      # --- Identities (all optional) ----------------------------------------
      # Precedence per network: explicit value > existing file in volume >
      # anonymous. Every var also accepts a "<VAR>_FILE" form (Docker secrets).
      # DCC_CLIENT_ID: "1234567"
      # DCC_CLIENT_PASSWD_FILE: /run/secrets/dcc_pass
      # Razor: register/link an account...
      # RAZOR_REGISTER_USER: "you@example.com"
      # RAZOR_REGISTER_PASS_FILE: /run/secrets/razor_pass
      # ...or supply an account you already hold (skips registration):
      # RAZOR_USER: "you@example.com"
      # RAZOR_PASS_FILE: /run/secrets/razor_pass
      # PYZOR_SERVERS: "public.pyzor.org:24441"

    secrets:
      - drp_token

    # No volumes: the image carries no writable state. gozer reads all config
    # from the environment; supply RAZOR_USER/RAZOR_PASS (or _FILE) for /report.

    # --- Hardening ---------------------------------------------------------
    read_only: true                 # immutable rootfs (distroless, nonroot)
    tmpfs:
      - /tmp:mode=1777              # scratch only; gozer writes nothing to disk
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # The image already defines a HEALTHCHECK (`gozer health`, no shell/curl);
    # this override just mirrors it for clarity.
    healthcheck:
      test: ["CMD", "/usr/local/bin/gozer", "health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  drp:
    # Attach your rspamd/dovecot stack to this same network (external: true if
    # it already exists elsewhere).
    driver: bridge

secrets:
  drp_token:
    file: ./secrets/drp_token.txt   # one line: the shared secret
