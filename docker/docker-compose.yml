services:
  rspamd-drp:
    image: eilandert/rspamd-dcc-razor-pyzor:latest
    container_name: rspamd-drp
    restart: unless-stopped

    # No `ports:` — the shim is NOT published to the host. It is reachable only
    # on the internal docker network, by service name, from your rspamd (and
    # dovecot) containers: http://rspamd-drp:8077
    networks:
      - drp

    environment:
      TZ: Europe/Amsterdam

      # Verbose logging: per-request access line + verdict/timing/cache detail.
      SHIM_VERBOSE: "0"                # 1 to enable

      # --- Cache ------------------------------------------------------------
      # /check verdicts cached by body hash (DCC/Razor/Pyzor target bulk = repeats).
      SHIM_CACHE_TTL: "300"            # seconds; 0 disables
      # SHIM_CACHE_SIZE: "4096"        # in-memory LRU entries
      # Shared cache across distributed scanners (else in-process LRU):
      # SHIM_REDIS_URL: "redis://valkey:6379/5"
      # SHIM_REDIS_PREFIX: "drp:check:"

      # --- Auth (required) --------------------------------------------------
      # The shim refuses every POST (503) until a token is set. The rspamd
      # plugin and dovecot drp-report must present the same value. Prefer the
      # _FILE form (Docker secret) over an inline value.
      SHIM_TOKEN_FILE: /run/secrets/drp_token
      # or, inline (less safe): SHIM_TOKEN: "change-me"

      # --- Identities (all optional) ----------------------------------------
      # Precedence per network: explicit value > existing file in volume >
      # anonymous. Every var also accepts a "<VAR>_FILE" form (Docker secrets).
      # DCC_CLIENT_ID: "1234567"
      # DCC_CLIENT_PASSWD_FILE: /run/secrets/dcc_pass
      # RAZOR_REGISTER_USER: "you@example.com"
      # RAZOR_REGISTER_PASS_FILE: /run/secrets/razor_pass
      # PYZOR_SERVERS: "public.pyzor.org:24441"

    secrets:
      - drp_token

    volumes:
      - drp-razor:/var/lib/razor
      - drp-pyzor:/var/lib/pyzor
      - drp-dcc:/var/dcc

    # --- Hardening ---------------------------------------------------------
    read_only: true                 # immutable rootfs; only the mounts + tmpfs writable
    tmpfs:
      - /run:exec,mode=0755         # s6 runtime + /run/dcc (exec: s6 runs helpers)
      - /tmp:mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  drp:
    # Attach your rspamd/dovecot stack to this same network (external: true if
    # it already exists elsewhere).
    driver: bridge

volumes:
  drp-razor:
  drp-pyzor:
  drp-dcc:

secrets:
  drp_token:
    file: ./secrets/drp_token.txt   # one line: the shared secret
