name: docker-integration
# Manual: builds the real image (gozer Go builder stage, from the docker/gozer
# submodule) and smoke-tests the HTTP API. Needs the eilandert/debian-base
# image, so it is not run on every push.
on:
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive   # gozer source for the image build

      - name: Pull base image
        run: docker pull eilandert/debian-base:stable

      - name: Build + integration smoke test
        run: ./ci-build.sh docker
