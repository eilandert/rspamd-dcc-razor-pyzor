name: ci
# The Go backend (gozer) has moved to its own repo, github.com/myguard-labs/gozer,
# and is built/vetted/tested by that repo's CI. It is pulled in here as the
# docker/gozer submodule. This workflow covers only what this repo owns: the
# rspamd lua plugin. The full image build + HTTP smoke test lives in
# docker.yml (workflow_dispatch — needs the base image + deb.myguard.nl).
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: luacheck
        # luacheck is not reliably apt-installable on the runner; use the
        # purpose-built image (reads the repo .luacheckrc).
        run: docker run --rm -v "$PWD":/data -w /data pipelinecomponents/luacheck:latest luacheck rspamd/plugins/
