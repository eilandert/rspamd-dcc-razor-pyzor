name: ci
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: docker

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: docker/go.sum
      - name: build
        run: go build -mod=vendor ./...
      - name: vet
        run: go vet -mod=vendor ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: test (race)
        run: go test -mod=vendor -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: docker/go.sum
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  lua:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5
      - name: luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends luacheck
          luacheck rspamd/plugins/

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          source-root: docker
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: docker/go.sum
      - run: cd docker && go build -mod=vendor ./...
      - uses: github/codeql-action/analyze@v3
