name: ci
on:
  push:
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt ruff
          # shellcheck is preinstalled on ubuntu-latest; luacheck best-effort.
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends luacheck || true

      - name: Lint
        run: ./ci-build.sh lint

      - name: Unit tests
        run: ./ci-build.sh unit
