# local.d/groups.conf — scores for the collaborative-filtering symbols.
# Merged into rspamd's global symbol groups. Conservative weights: these
# networks have non-zero false-positive rates, so they nudge rather than
# decide on their own. Tune to taste.
group "dcc_razor_pyzor" {
  description = "DCC / Razor / Pyzor collaborative filters (via local shim)";

  symbols {
    "DRP_DCC_BULK" {
      weight = 2.0;
      description = "DCC reports the message body as bulk";
    }
    "DRP_RAZOR" {
      weight = 1.5;
      description = "Razor signature match";
    }
    "DRP_PYZOR" {
      weight = 1.5;
      description = "Pyzor reports the message above sighting threshold";
    }
  }
}
