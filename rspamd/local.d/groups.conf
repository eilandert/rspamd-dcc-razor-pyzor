# local.d/groups.conf — scores for the collaborative-filtering symbols.
# The three networks (DCC, Razor, Pyzor) checked via the gozer backend are
# grouped under "DRP" with a max_score ceiling so their combined contribution is
# capped. Conservative per-network weights: these have non-zero false-positive
# rates, so they nudge rather than decide on their own. Tune to taste.
group "DRP" {
  description = "DRP collaborative filters — DCC / Razor / Pyzor (via gozer)";
  max_score = 15;                # ceiling on the group's combined contribution

  symbols {
    "DRP_DCC_BULK" {
      weight = 3.0;
      description = "DCC reports the message body as bulk";
    }
    "DRP_RAZOR" {
      weight = 1.0;
      description = "Razor signature match";
    }
    "DRP_PYZOR" {
      weight = 2.0;
      description = "Pyzor reports the message above sighting threshold";
    }
  }
}
