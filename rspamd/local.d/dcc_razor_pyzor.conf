# local.d/dcc_razor_pyzor.conf — tuning for the dcc_razor_pyzor.lua plugin.
# Merged into the rspamd config under the "dcc_razor_pyzor" section.

# Shim endpoint (spamcheck_shim.py). On a separate host/container use its name,
# e.g. "http://rspamd-drp:8077/check".
url = "http://127.0.0.1:8077/check";
# Shared secret — must equal the shim's SHIM_TOKEN. Keep this file root-readable
# only, or use rspamd's secret include. Required: the shim 503s without it.
token = "change-me";
timeout = 8.0;
max_size = 1048576;

# Symbol names (must match metric scores below).
symbol_dcc   = "DRP_DCC_BULK";
symbol_razor = "DRP_RAZOR";
symbol_pyzor = "DRP_PYZOR";

# Hit thresholds.
dcc_bulk_threshold    = 1000;
pyzor_count_threshold = 5;
