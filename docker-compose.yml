services:
  rspamd-drp:
    image: eilandert/rspamd-dcc-razor-pyzor:latest
    container_name: rspamd-drp
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "8077:8077"     # spamcheck shim — queried by the external rspamd plugin
    volumes:
      - drp-razor:/var/lib/razor
      - drp-pyzor:/var/lib/pyzor
      - drp-dcc:/var/dcc
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  drp-razor:
  drp-pyzor:
  drp-dcc:
