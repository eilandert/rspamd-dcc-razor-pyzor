# Dovecot config drop-in: report mail to DCC/Razor/Pyzor on Junk moves, via the
# rspamd-dcc-razor-pyzor shim. Install on the DOVECOT host as
# /etc/dovecot/conf.d/90-drp-sieve.conf and restart dovecot.
#
# Prerequisites on the dovecot host:
#   * curl installed
#   * dovecot-sieve + the imap_sieve/extprograms plugins available
#   * scripts deployed:
#       dovecot/drp-report                 -> /usr/lib/dovecot/sieve-pipe/drp-report   (0755)
#       dovecot/sieve/report-spam.sieve    -> /usr/lib/dovecot/sieve/report-spam.sieve
#       dovecot/sieve/report-ham.sieve     -> /usr/lib/dovecot/sieve/report-ham.sieve
#     then compile: sievec /usr/lib/dovecot/sieve/report-spam.sieve (and report-ham)
#   * tell drp-report where the backend is (if not the default):
#       service managesieve-login { ... }   # n/a
#     Set DRP_URL + DRP_TOKEN (sieve_extprograms scrubs the env) via a file the
#     bridge sources:
#       printf 'DRP_URL=http://rspamd-drp:8077\nDRP_TOKEN=the-shared-secret\n' \
#         > /etc/dovecot/drp.env
#     DRP_TOKEN must match the shim's SHIM_TOKEN or reports are rejected (401).

protocol imap {
  mail_plugins = $mail_plugins imap_sieve
}

plugin {
  sieve_plugins = sieve_imapsieve sieve_extprograms
  sieve_pipe_bin_dir = /usr/lib/dovecot/sieve-pipe

  # Restrict what piped programs may do (extprograms safety).
  sieve_extensions = +vnd.dovecot.pipe

  # 1) Moved/copied INTO Junk  -> report as SPAM
  imapsieve_mailbox1_name = Junk
  imapsieve_mailbox1_causes = COPY APPEND
  imapsieve_mailbox1_before = file:/usr/lib/dovecot/sieve/report-spam.sieve

  # 2) Moved OUT of Junk (into any other mailbox) -> revoke as HAM
  imapsieve_mailbox2_name = *
  imapsieve_mailbox2_from = Junk
  imapsieve_mailbox2_causes = COPY
  imapsieve_mailbox2_before = file:/usr/lib/dovecot/sieve/report-ham.sieve
}
